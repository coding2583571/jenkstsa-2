{% load static %}
{% extends "base.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <img src="{% static 'img/jenkstsa_logo.png' %}" alt="Jenks TSA" class="auth-logo">
    <h1 class="auth-title">Welcome back.</h1>
    <p class="auth-sub">Sign in to your Jenks TSA account.</p>

    {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="auth-form-field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required autofocus autocomplete="email">
      </div>
      <div class="auth-form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="auth-submit">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'accounts:signup' %}">Create one →</a>
    </div>
  </div>
</div>
{% endblock %}
